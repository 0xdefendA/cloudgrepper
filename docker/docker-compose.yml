services:
  minio:
    image: minio/minio
    command: server /data
    ports: ["9000:9000"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports: ["10000:10000"]
  fake-gcs:
    image: fsouza/fake-gcs-server
    command: ["-scheme", "http", "-port", "4443", "-public-host", "localhost:4443"]
    ports: ["4443:4443"]
